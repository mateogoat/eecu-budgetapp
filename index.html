<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@latest/dist/chart.umd.min.js"></script>
    <script type="module" src="./navigation.js"></script>
</head>

<body>
    <header>
        <nav>
            <!-- Assumign we'll put ::before css for image-->
            <img src="images\eecu-logo.png">
            <p>EECU</p>
        </nav>
    </header>

    <section class="heading">
        <button class="back"><b>&larr;</b></button>
        <h1>Budget Calculator</h1>
    </section>


    <section id="career-input-section">
        <p>Career:</p>
        <select name="career" id="career-input">
            <!--Should be a dropdown menu to search for career (API)-->
            <option value="unanswered"></option>
        </select>
        <label for="income">Income:</label>
        <input type="text" id="income">
        <label id="salaryContainer">$<span id="salary"></span></label>

        <label for="tax-income">Net Yearly Salary <img src="images/Info.png" id="taxInfoButton">
    </section>

    <section id="main-content" class="hide">
        <section id="category-education" class="inputs">
            
            <template class="page-0">
                <h2>Category 1: Education</h2>
                <div class="blue-background">
                    <ul>
                        <li>
                            <section class="spending-input">
                                <p>Monthly Tuition</p>
                                <input type="text" id="monthly-tuition-input" inputmode="numeric" value="0" onchange="updateChart()"/>
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Books & Supplies</p>
                                <input type="text" id="books-and-supplies-input" inputmode="numeric" value="0" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Dorm & Board</p>
                                <input type="text" id="dorm-and-board-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Other Expenses</p>
                                <input type="text" id="other-expenses-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                    </ul>
                </div>
            </template>

            <template class="page-1">
                <h2>Category 2: Housing</h2>
                <div class="blue-background">
                    <ul>
                        <li>
                            <section class="spending-input">
                                <p>Rent Payment</p>
                                <input type="text" id="rent-payment-input" inputmode="numeric" value="0" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Utilities</p>
                                <input type="text" id="utilities-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Renter's Insurance</p>
                                <input type="text" id="renter-insurance-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Other Expenses</p>
                                <input type="text" id="other-expenses-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                    </ul>
                </div>
            </template>

            <template class="page-2">
                <h2>Category 3: Essentials</h2>
                <div class="blue-background">
                    <ul>
                        <li>
                            <section class="spending-input">
                                <p>Groceries</p>
                                <input type="text" id="groceries-input" inputmode="numeric" value="0" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Car Insurance</p>
                                <input type="text" id="car-insurance-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Medical Insurance</p>
                                <input type="text" id="medical-insurance-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Clothing</p>
                                <input type="text" id="clothing-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Other Expenses</p>
                                <input type="text" id="other-expenses-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                    </ul>
                </div>
            </template>

            <template class="page-3">
                <h2>Category 4: Lifestyle</h2>
                <div class="blue-background">
                    <ul>
                        <li>
                            <section class="spending-input">
                                <p>Dining Out</p>
                                <input type="text" id="dining-out-input" inputmode="numeric" value="0" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Streaming Services</p>
                                <input type="text" id="streaming-services-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">

                                <p>Gym Membership</p>
                                <input type="text" id="gym-membership-input" inputmode="numeric" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">

                                <p>Gaming</p>
                                <input type="text" id="gaming-input" inputmode="numeric" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">

                                <p>Other Expenses</p>
                                <input type="text" id="other-expenses-input" inputmode="numeric" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                    </ul>
                </div>
            </template>

            <template class="page-4">
                <h2>Category 5: Future Proofing</h2>
                <div class="blue-background">
                    <ul>
                        <li>
                            <section class="spending-input">
                                <p>401K & IRA</p>
                                <input type="text" id="-401k-and-ira-input" inputmode="numeric" value="0" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">

                                <p>Investments</p>
                                <input type="text" id="investments-input" inputmode="numeric" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">

                                <p>Savings</p>
                                <input type="text" id="savings-input" inputmode="numeric" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">

                                <p>Retirement Funds</p>
                                <input type="text" id="retirement-input" inputmode="numeric" onchange="updateChart()" />
                            </section>
                            <img src="../images/info.svg" />
                        </li>
                        <li>
                            <section class="spending-input">
                                <p>Other Expenses</p>
                                <input type="text" id="other-expenses-input" inputmode="numeric" onchange="updateChart()" />
                            </section>

                            <img src="../images/info.svg" />
                        </li>
                    </ul>
                </div>
            </template>

            
        </section>

        <section id="chart-and-submit">

            <div class="graph-container">
                <canvas class="graph"></canvas>
            </div>
            <button id="continue-button" class="next">Continue</button>
            <a href="results.html" class="next">Results</a>
            <!-- here ya go, fix it pls (typo - Rescheults, rshoult*, resulds*)-->
        </section>
    </section>

    <footer>
        <p>
            Important note: Some expenses may not apply to you. If so, just
            mark the expense amount to $0.
        </p>
    </footer>
</body>

</html>
